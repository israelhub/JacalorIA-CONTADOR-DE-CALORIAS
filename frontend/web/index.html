<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided by `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Prefer fresh entry documents after each deploy (CDN/browser). -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="description" content="JacalorIA — contador de calorias com IA">
  <meta name="theme-color" content="#1E513E">
  <!-- viewport-fit=cover is required for env(safe-area-inset-*) on iOS/Android browsers -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JacalorIA">
  <link rel="apple-touch-icon" href="icons/Icon-192.webp">

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="favicon.webp"/>

  <title>JacalorIA</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
      background-color: #FFFFFF;
    }
  </style>
</head>
<body>
  <!-- Probe for CSS safe-area insets (Flutter Web often reports MediaQuery padding as 0). -->
  <div id="flt-safe-area-probe" aria-hidden="true" style="
    position: absolute;
    left: 0;
    top: 0;
    width: 0;
    height: 0;
    visibility: hidden;
    pointer-events: none;
    padding-top: env(safe-area-inset-top, 0px);
    padding-right: env(safe-area-inset-right, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    padding-left: env(safe-area-inset-left, 0px);
  "></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
